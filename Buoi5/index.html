<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color:black
    }
    .hed{
        background-color: blueviolet;
        width: 100px;
        height: 100px;
        border-radius:10%;
        font-size: 16px;
        color:white;
        display: flex;
        justify-content: center;
        align-items: center;    
    }
    .container{
        display: flex;
        gap: 40px;
          justify-content: center;
    }
    .menu-1::before{
        content: '';
        display: inline-block;
        height: 15px;
        width: 15px;
        background-color: blueviolet;
        margin-right: 10px;
        transform: rotate(45deg);
    }
    h2{
       color: blueviolet;
       font-size: 32px;
    }
    /* .menu-2::before{
        content: '';
        display: inline-block;
        height: 15px;
        width: 15px;
    border-color: orange;
    border-style: solid;
        margin-right: 10px;
        

    } */
    .tran:hover{
        animation: tran 1s linear infinite;
    }
    @keyframes tran{
        0%{
            transform: translate(0,0);
        }
        50%{
            transform: translate(20px,0);
        }
        100%{
            transform: translate(0,0);
        }
    }
    .rot:hover{
        animation: rot 1s linear infinite;
    }
    @keyframes rot{
        0%{
            transform: rotate(0deg);
        }
        50%{
            transform: rotate(45deg);
        }
        100%{
            transform: rotate(0deg);
        }
    }
    .sca:hover{
        animation: sca 1s linear infinite;
    }
    @keyframes sca{
        0%{
            transform: scale(1);
        }
        50%{
            transform: scale(1.2);
        }
        100%{
            transform: scale(1);
        }
    }
    .com:hover{
        animation: com 1s linear infinite;
    }
    @keyframes com{
        0%{
            transform: translate(0,0) rotate(0deg) scale(1);
        }
        50%{
            transform: translate(20px,0) rotate(45deg) scale(1.2);
        }
        100%{
            transform: translate(0,0) rotate(0deg) scale(1);
        }
    }
    .overlay{
        display: flex;
        flex-direction: row;
        gap: 40px;
        justify-content: center;
    }
    .imsss {
        height: 300px;
        width: 200px;
        position: relative;
        overflow: hidden;
    }

    img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .overlay-content{
        position: absolute;
        top:0;
        left:0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, #053ae9, #e805e8);
        opacity: 0;
        transition: all 0.5s ease;
    }
    .imsss:hover .overlay-content{
        opacity: 1;
    }
    .anis{
        display: flex;  
        gap: 40px;
        justify-content: center;
    }
    .ani{
  background-color: blueviolet;
        width: 100px;
        height: 100px;
        border-radius:10%;
        font-size: 16px;
        color:white;
        display: flex;
        justify-content: center;
        align-items: center;   
        
    }
    .bounce{
        animation: bounce 1s linear infinite;
        background-color: red;
    }
    .spin{
        animation: spin 1s linear infinite;
        background-color: orange;
    }
    .pulse{
        animation: pulse 1s linear infinite;
        background-color: green;
    }
    .slideln{
        animation: slideln 1s linear infinite;
        background-color: blue;
    }
      .circle{
        width: 50px;
        height: 50px;
       border-color: violet;
       border-style: solid;
        border-radius: 50%;
        border-top-color: whitesmoke;
        animation: spin 1s linear infinite;
    }
    .dot1 {
        display: inline-block;
        width: 20px;
        height: 20px;
        background-color: violet;
        border-radius: 50%;
        animation: bounce 1s linear infinite;
        animation-delay: 0.2s;
    }
    .dot2 {
        display: inline-block;
        width: 20px;
        height: 20px;
        background-color: violet;
        border-radius: 50%;
        animation: bounce 1s linear infinite;
        animation-delay: 0.4s;
    }
    .dot3 {
        display: inline-block;
        width: 20px;
        height: 20px;
        background-color: violet;
        border-radius: 50%;
        animation: bounce 1s linear infinite;
        animation-delay: 0.6s;
    }
    .load1, .load2, .load3, .load4, .load5 {
        display: inline-block;
        width: 7px;
        height: 30px;
        background-color: violet;
        border-radius: 15%;
        animation: pulse_2 1s linear infinite;
    }
    .load1 {
        animation-delay: 0s;
    }
    .load2 {
        animation-delay: 0.1s;
    }
    .load3 {
        animation-delay: 0.2s;
    }
    .load4 {
        animation-delay: 0.3s;
    }
    .load5 {
        animation-delay: 0.4s;
    }
    @keyframes bounce{
        0%{
            transform: translateY(0);
        }
        50%{
            transform: translateY(-20px);
        }
        100%{
            transform: translateY(0);
        }
    }
    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }
    @keyframes pulse_2 {
        0% {
            transform: scale(0.5);
            opacity: 1;
        }
        50% {
            transform: scale(1);
            opacity: 0.5;
        }
        100% {
            transform: scale(0.5);
            opacity: 1;
        }
    }
    @keyframes pulse {
        0% {
            transform: scale(1);
            opacity: 1;
        }
        50% {
            transform: scale(1.2);
            opacity: 0.5;
        }
        100% {
            transform: scale(1);
            opacity: 1;
        }
    }
    @keyframes slideln {
        0% {
            transform: translateX(0px);
        }
        50% {
            transform: translateX(10px);
        }
        100% {
            transform: translateX(0px);
        }
    }
     .c{
        display: flex;
        gap: 40px;
        justify-content: center;    }
  
</style>
<body>
  <div class="tranf">
       <h2 style="text-align: center;" class="menu-1"> TRANSFORM - HOVER VÀO TỪNG Ô </h2>
        <div class="container">
            <div class="tran hed"> translate</div>
            <div class="rot hed"> rotate</div>
            <div class="sca hed"> scale</div>
            <div class="com hed"> combine</div>
        </div>
  </div>
  <div class="over">
        <h2 style="text-align: center;" class="menu-2"> 🗽OVERLAY EFFECT - HOVER VÀO CARD</h2>
        <div class="overlay">
            <div class="imsss">
                <img src="anh1.jpg" alt="">
                <div class="overlay-content"></div>
            </div>
            <div class="imsss">
                <img src="anh2.jpg" alt="">
                <div class="overlay-content"></div>
            </div>
            <div class="imsss">
                <img src="anh3.jpg" alt="">
                <div class="overlay-content"></div>
            </div>
  </div>
  <div class="frames">
        <h2 style="text-align: center;" class="menu-3">🌟 @ KEYFRAMES ANIMATION</h2>
        <div class="anis">
        <div class="ani bounce">bounce</div>
        <div class="ani spin">spin</div>
        <div class="ani pulse">pulse</div>
        <div class="ani slideln">slide</div>
        </div>
  </div>
  <div class="loader"  style="text-align: center;">
    <h2> 🤡 CSS LOADER (PURE CSS)</h2>
    <div class="c">
        <div class= "circle"></div>
        <div class="dot">
            <span class="dot1"></span>
            <span class="dot2"></span>
            <span class="dot3"></span>
        </div>
        <div class="load">
            <span class="load1"></span>
            <span class="load2"></span>
            <span class="load3"></span>
            <span class="load4"></span>
            <span class="load5"></span>
        </div>
    </div>
  </div>
</body>
</html>
